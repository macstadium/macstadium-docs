<?xml version="1.0" standalone="yes"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 415" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5366cc"/>
    </marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FE9000"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B6B80"/>
    </marker>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAFB"/>
      <stop offset="100%" stop-color="#EFEFF3"/>
    </linearGradient>
  </defs>

  <!-- ── END USER ACTOR ── -->
  <g transform="translate(15,20)">
    <rect x="0" y="0" width="100" height="100" rx="10" fill="#FFFFFF" stroke="#6B6B80" stroke-width="1.5" stroke-dasharray="5 3"/>
    <circle cx="50" cy="24" r="14" fill="#6B6B80"/>
    <path d="M 8 64 C 8 48 92 48 92 64 L 92 76 L 8 76 Z" fill="#6B6B80"/>
    <text x="50" y="93" text-anchor="middle" font-size="12" font-weight="700" fill="#323151">End User</text>
  </g>

  <!-- ── VDI BROKER / GATEWAY ── -->
  <g transform="translate(175,20)">
    <rect x="0" y="0" width="210" height="100" rx="10" fill="#FFFFFF" stroke="#5366cc" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="105" y="36" text-anchor="middle" font-size="13" font-weight="700" fill="#323151">VDI Broker / Gateway</text>
    <text x="105" y="55" text-anchor="middle" font-size="10" fill="#6B6B80">e.g., Citrix DaaS / HP Anyware</text>
    <text x="105" y="72" text-anchor="middle" font-size="10" fill="#6B6B80">session brokering · SSO / MFA</text>
  </g>

  <!-- ── IDENTITY ── -->
  <g transform="translate(445,20)">
    <rect x="0" y="0" width="165" height="100" rx="10" fill="#FFFFFF" stroke="#5366cc" stroke-width="2"/>
    <rect x="0" y="0" width="165" height="26" rx="10" fill="#323151"/>
    <rect x="0" y="18" width="165" height="8" fill="#323151"/>
    <text x="82" y="18" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Identity</text>
    <text x="82" y="50" text-anchor="middle" font-size="11" fill="#323151">Active Directory /</text>
    <text x="82" y="65" text-anchor="middle" font-size="11" fill="#323151">Entra ID / Okta</text>
    <text x="82" y="83" text-anchor="middle" font-size="10" fill="#6B6B80" font-style="italic">user groups · authentication</text>
  </g>

  <!-- ── TOP ROW ARROWS ── -->

  <!-- End User ↔ VDI Broker (remoting protocol) -->
  <line x1="115" y1="62" x2="175" y2="62" stroke="#FE9000" stroke-width="2" marker-end="url(#arrowO)"/>
  <line x1="175" y1="73" x2="115" y2="73" stroke="#FE9000" stroke-width="2" marker-end="url(#arrowO)"/>
  <text x="145" y="56" text-anchor="middle" font-size="9" fill="#FE9000">remoting</text>

  <!-- VDI Broker → Identity (auth) -->
  <line x1="385" y1="70" x2="445" y2="70" stroke="#5366cc" stroke-width="1.5" marker-end="url(#arrowD)"/>
  <text x="415" y="64" text-anchor="middle" font-size="9" fill="#5366cc">auth</text>

  <!-- VDI Broker ↓ MacStadium VDI (session dispatch) -->
  <line x1="280" y1="120" x2="280" y2="175" stroke="#5366cc" stroke-width="1.5" marker-end="url(#arrowD)"/>
  <text x="290" y="152" text-anchor="start" font-size="9" fill="#5366cc">session</text>

  <!-- ── MACSTADIUM VDI CONTAINER ── -->
  <rect x="15" y="175" width="845" height="225" rx="14" fill="url(#bgGrad)" stroke="#5366cc" stroke-width="2"/>
  <rect x="15" y="175" width="845" height="36" rx="14" fill="#323151"/>
  <rect x="15" y="201" width="845" height="10" fill="#323151"/>
  <text x="35" y="200" font-size="15" font-weight="700" fill="#FFFFFF">MacStadium VDI</text>

  <!-- ── CONTROL PLANE ── -->
  <rect x="30" y="218" width="230" height="167" rx="10" fill="#FFFFFF" stroke="#5366cc" stroke-width="2"/>
  <rect x="30" y="218" width="230" height="26" rx="10" fill="#323151"/>
  <rect x="30" y="234" width="230" height="10" fill="#323151"/>
  <text x="145" y="236" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Control Plane</text>
  <line x1="44" y1="254" x2="246" y2="254" stroke="#EFEFF3" stroke-width="1.5"/>
  <text x="44" y="270" font-size="11" fill="#323151">• Orka Engine orchestration</text>
  <text x="44" y="287" font-size="11" fill="#323151">• VM lifecycle · image management</text>
  <text x="44" y="304" font-size="11" fill="#323151">• Management UI + Ansible CLI</text>
  <line x1="44" y1="317" x2="246" y2="317" stroke="#EFEFF3" stroke-width="1.5"/>
  <text x="145" y="333" text-anchor="middle" font-size="10" fill="#6B6B80" font-style="italic">Manages Mac hosts and VMs</text>
  <text x="145" y="371" text-anchor="middle" font-size="10" fill="#6B6B80" font-style="italic">across your deployment</text>

  <!-- Control Plane → Hosts (manages) -->
  <line x1="261" y1="301" x2="298" y2="301" stroke="#6B6B80" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowG)"/>
  <text x="279" y="294" text-anchor="middle" font-size="8" fill="#6B6B80">manages</text>

  <!-- ── MAC HOST 1 ── -->
  <rect x="300" y="218" width="265" height="167" rx="10" fill="#FFFFFF" stroke="#5366cc" stroke-width="2"/>
  <rect x="300" y="218" width="265" height="26" rx="10" fill="#323151"/>
  <rect x="300" y="234" width="265" height="10" fill="#323151"/>
  <text x="432" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Mac Host 1 (Apple silicon)</text>
  <!-- Orka Engine band -->
  <rect x="301" y="244" width="263" height="22" fill="#FFF5E8"/>
  <text x="432" y="260" text-anchor="middle" font-size="10" font-weight="700" fill="#FE9000">Orka Engine</text>
  <!-- VM A -->
  <rect x="308" y="270" width="118" height="100" rx="6" fill="#FFF5E8" stroke="#FE9000" stroke-width="1.5"/>
  <text x="367" y="287" text-anchor="middle" font-size="11" font-weight="700" fill="#323151">macOS VM</text>
  <text x="367" y="303" text-anchor="middle" font-size="10" fill="#323151">VDI agent</text>
  <text x="367" y="318" text-anchor="middle" font-size="10" fill="#323151">+ user apps</text>
  <text x="367" y="342" text-anchor="middle" font-size="9" fill="#6B6B80" font-style="italic">user A</text>
  <!-- VM B -->
  <rect x="441" y="270" width="118" height="100" rx="6" fill="#FFF5E8" stroke="#FE9000" stroke-width="1.5"/>
  <text x="500" y="287" text-anchor="middle" font-size="11" font-weight="700" fill="#323151">macOS VM</text>
  <text x="500" y="303" text-anchor="middle" font-size="10" fill="#323151">VDI agent</text>
  <text x="500" y="318" text-anchor="middle" font-size="10" fill="#323151">+ user apps</text>
  <text x="500" y="342" text-anchor="middle" font-size="9" fill="#6B6B80" font-style="italic">user B</text>

  <!-- ── MAC HOST 2 ── -->
  <rect x="580" y="218" width="265" height="167" rx="10" fill="#FFFFFF" stroke="#5366cc" stroke-width="2"/>
  <rect x="580" y="218" width="265" height="26" rx="10" fill="#323151"/>
  <rect x="580" y="234" width="265" height="10" fill="#323151"/>
  <text x="712" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Mac Host 2 (Apple silicon)</text>
  <!-- Orka Engine band -->
  <rect x="581" y="244" width="263" height="22" fill="#FFF5E8"/>
  <text x="712" y="260" text-anchor="middle" font-size="10" font-weight="700" fill="#FE9000">Orka Engine</text>
  <!-- VM C -->
  <rect x="588" y="270" width="118" height="100" rx="6" fill="#FFF5E8" stroke="#FE9000" stroke-width="1.5"/>
  <text x="647" y="287" text-anchor="middle" font-size="11" font-weight="700" fill="#323151">macOS VM</text>
  <text x="647" y="303" text-anchor="middle" font-size="10" fill="#323151">VDI agent</text>
  <text x="647" y="318" text-anchor="middle" font-size="10" fill="#323151">+ user apps</text>
  <text x="647" y="342" text-anchor="middle" font-size="9" fill="#6B6B80" font-style="italic">user C</text>
  <!-- VM D -->
  <rect x="721" y="270" width="118" height="100" rx="6" fill="#FFF5E8" stroke="#FE9000" stroke-width="1.5"/>
  <text x="780" y="287" text-anchor="middle" font-size="11" font-weight="700" fill="#323151">macOS VM</text>
  <text x="780" y="303" text-anchor="middle" font-size="10" fill="#323151">VDI agent</text>
  <text x="780" y="318" text-anchor="middle" font-size="10" fill="#323151">+ user apps</text>
  <text x="780" y="342" text-anchor="middle" font-size="9" fill="#6B6B80" font-style="italic">user D</text>

</svg>
